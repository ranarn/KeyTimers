name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ✈️ Release Pilot
        id: release
        uses: ranarn/release-pilot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-release: true

      - name: ⚙️ Setup .NET
        if: steps.release.outputs.released == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true

      - name: 📦 Restore
        if: steps.release.outputs.released == 'true'
        run: dotnet restore --locked-mode -r win-x64

      - name: 🚀 Publish
        if: steps.release.outputs.released == 'true'
        run: |
          dotnet publish KeyTimers.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: 🗜️ Zip
        if: steps.release.outputs.released == 'true'
        run: Compress-Archive -Path publish\KeyTimers.exe -DestinationPath KeyTimers-${{ steps.release.outputs.tag }}.zip -CompressionLevel Optimal

      - name: 📎 Upload to release
        if: steps.release.outputs.released == 'true'
        run: gh release upload ${{ steps.release.outputs.tag }} KeyTimers-${{ steps.release.outputs.tag }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
